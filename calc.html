<!DOCTYPE html>
<html>
<head>
<title>Real Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#e6e6e6;
}

.calculator{
    width:320px;
    background:#2f2f2f;
    border-radius:20px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    background:#1f1f1f;
    color:white;
    text-align:right;
    font-size:40px;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
}

.number{
    background:#4d4d4d;
    color:white;
}

.operator{
    background:#666666;
    color:white;
}

.clear{
    background:#d9534f;
    color:white;
}

.equal{
    background:#f39c12;
    color:white;
}

.zero{
    grid-column:span 2;
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="operator" onclick="deleteLast()">⌫</button>
<button class="operator" onclick="addValue('%')">%</button>
<button class="operator" onclick="addValue('/')">÷</button>

<button class="number" onclick="addValue('7')">7</button>
<button class="number" onclick="addValue('8')">8</button>
<button class="number" onclick="addValue('9')">9</button>
<button class="operator" onclick="addValue('*')">×</button>

<button class="number" onclick="addValue('4')">4</button>
<button class="number" onclick="addValue('5')">5</button>
<button class="number" onclick="addValue('6')">6</button>
<button class="operator" onclick="addValue('-')">−</button>

<button class="number" onclick="addValue('1')">1</button>
<button class="number" onclick="addValue('2')">2</button>
<button class="number" onclick="addValue('3')">3</button>
<button class="operator" onclick="addValue('+')">+</button>

<button class="number zero" onclick="addValue('0')">0</button>
<button class="number" onclick="addValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

function addValue(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function deleteLast(){
    let current = document.getElementById("display").value;
    document.getElementById("display").value =
    current.slice(0,-1);
}

function calculate(){
    try{
        let result =
        eval(document.getElementById("display").value);

        document.getElementById("display").value =
        result;
    }
    catch{
        document.getElementById("display").value =
        "Error";
    }
}

</script>

</body>
</html>
